spring.application.name=payment-api

# サーバーのポート番号（Reactと被らないように8080にします）
server.port=8080

# KOMOJUの非公開鍵（★ここを自分の鍵に書き換える！）
komoju.secret-key=${KOMOJU_SECRET_KEY:}

# H2 Database Settings
spring.datasource.url=jdbc:h2:file:./data/shopdb;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console (Optional, allows you to see the DB at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

app.mail.mock-enabled=true

